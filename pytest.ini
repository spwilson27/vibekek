[pytest]
addopts = -x -n 4 -m "not slow and not discord"
timeout = 300
testpaths = tests
norecursedirs = rag-tool .venv __pycache__ .mypy_cache .pytest_cache
markers =
    slow: integration or end-to-end tests that are intentionally slower than the default unit-test budget
    discord: tests that interact with Discord (skipped by default)
